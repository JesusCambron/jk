<section class="hero" aria-label="Invitación de boda">
  <div class="bg" role="img" aria-label="Fondo de invitación"
    [ngStyle]="{ 'background-image': 'url(' + config.hero.backgroundImage + ')' }"></div>

  <div class="overlay" aria-hidden="true"></div>

  <div class="content">
    <h1 class="names">{{ config.coupleNames }}</h1>
    <p class="subtitle">{{ config.hero.subtitle }}</p>
  </div>

</section>
