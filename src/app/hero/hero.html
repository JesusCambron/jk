<section class="hero" [class.is-active]="isStarted" aria-label="Invitación de boda">
  <div class="bg" role="img" aria-label="Fondo de invitación"
    [ngStyle]="{ 'background-image': 'url(' + config.hero.backgroundImage + ')' }"></div>

  <div class="overlay" aria-hidden="true"></div>

  <div class="content">
    <h1 class="names">{{ config.coupleNames }}</h1>
    <p class="subtitle">{{ config.hero.subtitle }}</p>
  </div>

  <div class="scroll-indicator" (click)="scrollToDetalles()" aria-label="Desplazarse hacia abajo">
    <span class="material-icons bounce-arrow">keyboard_double_arrow_down</span>
  </div>
</section>
